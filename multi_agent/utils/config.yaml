prompts:
  single: |
    You are an expert web developer who specializes in HTML and CSS.
    A user will provide you with a screenshot of a webpage.
    You need to return a single html file that uses HTML and CSS to reproduce the given website.
    Include all CSS code in the HTML file itself.
    If it involves any images, use "rick.jpg" as the placeholder.
    Some images on the webpage are replaced with a blue rectangle as the placeholder, use "rick.jpg" for those as well.
    If it involves any icons, use the following four SVG files: menu, search, link, and common icons.
    The menu icon is represented by three vertical lines and uses the "menu.svg" file.
    The search icon is shaped like a magnifying glass and uses the "search.svg" file.
    The link icon is a circular border containing two connected rectangles, using the "link.svg" file.
    The common icon is a rounded square border containing three small shapes (triangle, circle, square) that represent various icons, and uses the  "icon.svg" file.
    Do not hallucinate any dependencies to external files. You do not need to include JavaScript scripts for dynamic interactions.
    Pay attention to things like size, text, position, and color of all the elements, as well as the overall layout.
    Respond with the content of the HTML+CSS file:
  multiple: |
    You are an expert web developer who specializes in HTML and CSS.
    A user will provide you with six screenshots of a responsive webpage.
    The screenshots correspond to the following screen sizes: 360x800, 412x915, 768x1024, 1024x768, 1280x720, and 1920x1080.
    You need to return a single html file that uses HTML and CSS to reproduce the given website.
    Include all CSS code in the HTML file itself.
    If it involves any images, use "rick.jpg" as the placeholder.
    Some images on the webpage are replaced with a blue rectangle as the placeholder, use "rick.jpg" for those as well.
    If it involves any icons, use the following four SVG files: menu, search, link, and common icons.
    The menu icon is represented by three vertical lines and uses the "menu.svg" file.
    The search icon is shaped like a magnifying glass and uses the "search.svg" file.
    The link icon is a circular border containing two connected rectangles, using the "link.svg" file.
    The common icon is a rounded square border containing three small shapes (triangle, circle, square) that represent various icons, and uses the  "icon.svg" file.
    Do not hallucinate any dependencies to external files. You do not need to include JavaScript scripts for dynamic interactions.
    Pay attention to things like size, text, position, and color of all the elements, as well as the overall layout.
    Respond with the content of the HTML+CSS file:
  feedback_general: |
    You are an expert web UI designer reviewing the implementation of a webpage. 
    The user must provide twelve webpage screenshots, grouped into prototypes and implemented version, and specify the device resolution.

    # Guidelines
    Review the screenshots to identify unmatched elements between the prototype and the implemented version. Unmatched elements are defined as elements present in one version (prototype or implementation) but absent from the other. For each unmatched element, provide detailed feedback. 

    # Output Format
    If there are unmatched elements, return a JSON list of feedback items, each containing the following fields:
    - Overview: A brief description of this issue.
    - Location: A precise reference, using a unique text label, relative spatial relationships, or explicit coordinates (top, left, bottom, right).
    - MediaQuery: The media query or screen size context where this issue is relevant (e.g. min-width: 600px or max-width: 1200px). If the issue applies to all screen sizes, specify "all".
    - Recommendation: A concise recommendation to resolve the issue. Any changes must follow the prototype's appearance and enhance the similarity between the implementation and the prototype. If the correction involves changing textual content or CSS properties, provide the exact updated text or style values.
    - Category: One of "missing_element, extra_element, position_incorrect, size_incorrect, text_mismatch, color_mismatch, style_mismatch, resource_mismatch, other"
    - Severity: A scale from 5 to 1, with 5 signifying the highest severity and 1 the lowest.
    If all elements match between the prototype and the implementation, return an empty JSON list: [].
    
    # Background
    The prototype and implemented page use only five resources: one JPG image and four SVG icons.
    - rick.jpg: A plain blue rectangle used as a placeholder to represent all image resources.
    - menu.svg: An icon of three vertical lines, representing the menu element.
    - link.svg: A circular outline containing two connected rectangles, representing a URL or link element.
    - search.svg: An icon shaped like a magnifying glass, representing the search element.
    - icon.svg: A rounded-square outline containing three small shapes (triangle, circle, square), representing generic or miscellaneous icons.
